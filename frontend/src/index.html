<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIS-POST - Sistema de Punto de Venta</title>
  <link rel="stylesheet" href="./styles/main.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    #app {
      min-height: 100vh;
    }

    /* Login Styles */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }

    .login-box h1 {
      text-align: center;
      color: #667eea;
      margin-bottom: 10px;
    }

    .login-box h2 {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .error-message {
      color: #dc3545;
      text-align: center;
      margin-top: 10px;
    }

    /* Dashboard Styles */
    .dashboard {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .dashboard-header {
      background: #667eea;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dashboard-header h1 {
      font-size: 24px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .dashboard-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .products-panel {
      width: 50%;
      padding: 20px;
      background: white;
      overflow-y: auto;
    }

    .search-bar {
      margin-bottom: 20px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    .categories {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .category-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    .product-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .product-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
    }

    .product-name {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .product-price {
      color: #667eea;
      font-size: 18px;
      font-weight: bold;
    }

    .product-stock {
      color: #6c757d;
      font-size: 12px;
      margin-top: 5px;
    }

    .cart-panel {
      width: 35%;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #ddd;
    }

    .cart-header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .empty-cart {
      text-align: center;
      color: #6c757d;
      padding: 40px;
    }

    .cart-item {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 600;
      font-size: 14px;
    }

    .cart-item-price {
      color: #6c757d;
      font-size: 12px;
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .qty-btn {
      width: 25px;
      height: 25px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 3px;
      cursor: pointer;
    }

    .qty {
      padding: 0 10px;
    }

    .remove-btn {
      width: 25px;
      height: 25px;
      border: none;
      background: #dc3545;
      color: white;
      border-radius: 3px;
      cursor: pointer;
      margin-left: 10px;
    }

    .cart-item-subtotal {
      font-weight: bold;
      margin-left: 15px;
    }

    .cart-footer {
      padding: 20px;
      background: white;
      border-top: 1px solid #ddd;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .cart-actions {
      display: flex;
      gap: 10px;
    }

    .cart-actions .btn {
      flex: 1;
    }

    .info-panel {
      width: 15%;
      background: white;
      border-left: 1px solid #ddd;
      padding: 20px;
      overflow-y: auto;
    }

    .info-section {
      margin-bottom: 30px;
    }

    .info-section h3 {
      margin-bottom: 15px;
      font-size: 16px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .info-item .label {
      color: #6c757d;
    }

    .info-item .value {
      font-weight: 600;
    }

    .page-container {
      padding: 30px;
    }

    .page-container h1 {
      margin-bottom: 20px;
    }

    .page-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
